name: Release router

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version part to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version_file="version.properties"
          current="$(grep '^VERSION_NAME=' "$version_file" | cut -d'=' -f2 | tr -d '[:space:]')"
          current="${current#v}"
          IFS='.' read -r major minor patch <<< "$current"

          if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
            echo "VERSION_NAME must use X.Y.Z format. Current value: $current" >&2
            exit 1
          fi

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next="${major}.${minor}.${patch}"
          tag="v${next}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists." >&2
            exit 1
          fi

          echo "next=${next}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          printf 'VERSION_NAME=%s\n' "$next" > "$version_file"

      - name: Update release docs
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"

          python - <<'PY'
          from pathlib import Path
          import os
          import re

          tag = os.environ["TAG"]
          artifacts = ["core_router_api", "core_router_annotation", "core_router_processor"]

          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8")
          text = re.sub(r"AndroidCoreRouters/v\d+\.\d+\.\d+", f"AndroidCoreRouters/{tag}", text)
          for artifact in artifacts:
              text = re.sub(
                  rf"com\.github\.wukuiqing49:{artifact}:v?\d+\.\d+\.\d+(?:-[A-Za-z0-9.]+)?",
                  f"com.github.wukuiqing49:{artifact}:{tag}",
                  text,
              )
              text = re.sub(
                  rf"com\.github\.wukuiqing49\.AndroidCoreRouters:{artifact}:v?\d+\.\d+\.\d+(?:-[A-Za-z0-9.]+)?",
                  f"com.github.wukuiqing49.AndroidCoreRouters:{artifact}:{tag}",
                  text,
              )
          text = re.sub(r"POM_VERSION=v?\d+\.\d+\.\d+(?:-[A-Za-z0-9.]+)?", f"POM_VERSION={tag}", text)
          readme.write_text(text, encoding="utf-8")

          versions = Path("gradle/libs.versions.toml")
          text = versions.read_text(encoding="utf-8")
          text = re.sub(r'androidCoreRouters = "v?\d+\.\d+\.\d+(?:-[A-Za-z0-9.]+)?"', f'androidCoreRouters = "{tag}"', text)
          versions.write_text(text, encoding="utf-8")
          PY
        env:
          TAG: ${{ steps.version.outputs.tag }}

      - name: Verify release build
        run: |
          ./gradlew :app:assembleDebug publishRouterToMavenLocal \
            -PPOM_GROUP_ID=com.github.wukuiqing49 \
            -PPOM_VERSION=${{ steps.version.outputs.tag }} \
            -PGITHUB_REPOSITORY=wukuiqing49/AndroidCoreRouters

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew publishRouterToGitHubPackages \
            -PPOM_GROUP_ID=com.github.wukuiqing49 \
            -PPOM_VERSION=${{ steps.version.outputs.tag }} \
            -PGITHUB_REPOSITORY=wukuiqing49/AndroidCoreRouters

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.properties README.md gradle/libs.versions.toml
          git commit -m "release router ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish summary
        run: |
          echo "Router ${{ steps.version.outputs.tag }} has been pushed." >> "$GITHUB_STEP_SUMMARY"
          echo "JitPack: https://jitpack.io/#wukuiqing49/AndroidCoreRouters/${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo 'Use `core_router_api` with `implementation` and `core_router_processor` with `ksp`.' >> "$GITHUB_STEP_SUMMARY"
